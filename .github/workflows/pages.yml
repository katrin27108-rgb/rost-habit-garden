name: Publish habit tracker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get files
        uses: actions/checkout@v4
      - name: Restore garden artwork
        shell: bash
        run: |
          for source in site/garden/*.b64; do
            base64 --decode "$source" > "${source%.b64}"
          done
          rm site/garden/*.b64
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
